org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Project (E:) and the Flutter pub cache (C:) live on different drives. Kotlin's
# incremental compiler stores relative paths and cannot relativize across
# Windows drive roots, which corrupts its caches and fails the build. Disabling
# incremental Kotlin compilation sidesteps the cross-drive path computation.
kotlin.incremental=false
